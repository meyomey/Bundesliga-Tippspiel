{% extends "base.html" %}
{% block title %}Registrieren{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Konto erstellen</h2>
    <p class="muted">Kostenlos und in 30 Sekunden.</p>

    <form method="post" novalidate>
      {{ form.hidden_tag() }}
      <label>{{ form.username.label }}
        {{ form.username(class_='input', placeholder='Dein Username') }}
        {% for e in form.username.errors %}<span class="err">{{ e }}</span>{% endfor %}
      </label>
      <label>{{ form.email.label }}
        {{ form.email(class_='input', placeholder='du@email.de') }}
        {% for e in form.email.errors %}<span class="err">{{ e }}</span>{% endfor %}
      </label>
      <label>{{ form.password.label }}
        {{ form.password(class_='input', placeholder='Mindestens 6 Zeichen') }}
        {% for e in form.password.errors %}<span class="err">{{ e }}</span>{% endfor %}
      </label>
      <label>{{ form.confirm.label }}
        {{ form.confirm(class_='input') }}
        {% for e in form.confirm.errors %}<span class="err">{{ e }}</span>{% endfor %}
      </label>
      {{ form.submit(class_='btn-primary btn-block') }}
    </form>
    <div class="auth-meta">
      Schon Konto? <a href="{{ url_for('auth.login') }}">Anmelden</a>
    </div>
  </div>
</div>
{% endblock %}

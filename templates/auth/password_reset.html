{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Neues Passwort setzen</h2>
    <form method="post">
      {{ form.hidden_tag() }}
      <label>{{ form.password.label }} {{ form.password(class_='input') }}</label>
      <label>{{ form.confirm.label }} {{ form.confirm(class_='input') }}</label>
      {{ form.submit(class_='btn-primary btn-block') }}
    </form>
  </div>
</div>
{% endblock %}

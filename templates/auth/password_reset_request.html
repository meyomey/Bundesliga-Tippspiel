{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Passwort vergessen?</h2>
    <p class="muted">Wir schicken dir einen Reset-Link per E-Mail.</p>
    <form method="post">
      {{ form.hidden_tag() }}
      <label>{{ form.email.label }} {{ form.email(class_='input') }}</label>
      {{ form.submit(class_='btn-primary btn-block') }}
    </form>
    <div class="auth-meta"><a href="{{ url_for('auth.login') }}">Zurück zur Anmeldung</a></div>
  </div>
</div>
{% endblock %}
